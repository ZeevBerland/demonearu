name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python / Orchestrator ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv & install Python deps
        working-directory: orchestrator
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Freeze orchestrator with PyInstaller
        working-directory: orchestrator
        run: |
          source .venv/bin/activate
          pyinstaller nearu-orchestrator.spec --noconfirm

      - name: Verify orchestrator binary
        working-directory: orchestrator
        run: ls -la dist/nearu-orchestrator/nearu-orchestrator

      # ── Node / Electron ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Node dependencies
        working-directory: client
        run: npm ci

      - name: Build Electron client
        working-directory: client
        run: npm run build

      - name: Package macOS app
        working-directory: client
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifacts ─────────────────────────────────────────
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NearuVibe-macOS-dmg
          path: client/release/*.dmg
          if-no-files-found: warn

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: NearuVibe-macOS-zip
          path: client/release/*-mac.zip
          if-no-files-found: warn

      # ── Attach to GitHub Release (only on tag push) ──────────────
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/release/*.dmg
            client/release/*-mac.zip
