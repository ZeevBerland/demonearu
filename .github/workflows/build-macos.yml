name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python / Orchestrator ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv & install Python deps
        working-directory: orchestrator
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Freeze orchestrator with PyInstaller
        working-directory: orchestrator
        run: |
          source .venv/bin/activate
          pyinstaller nearu-orchestrator.spec --noconfirm

      - name: Verify orchestrator binary
        working-directory: orchestrator
        run: ls -la dist/nearu-orchestrator/nearu-orchestrator

      # ── Inject default API keys from secrets ─────────────────────
      - name: Create default-keys.json
        working-directory: client
        run: |
          cat > default-keys.json <<KEYSEOF
          {
            "OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }
          KEYSEOF

      # ── Node / Electron ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Node dependencies
        working-directory: client
        run: npm ci

      - name: Build Electron client
        working-directory: client
        run: npm run build

      - name: Package macOS app (unsigned bundle)
        working-directory: client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --dir --publish never

      # ── Re-sign to fix Team ID mismatch ────────────────────────
      - name: Ad-hoc codesign app bundle
        run: |
          APP=$(find client/release -name "*.app" -maxdepth 2 -type d | head -1)
          echo "Signing: $APP"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict "$APP" 2>&1 || true
          echo "Signature OK"

      # ── Create DMG and ZIP from signed bundle ──────────────────
      - name: Create DMG
        run: |
          APP_DIR=$(find client/release -name "*.app" -maxdepth 2 -type d -exec dirname {} \; | head -1)
          APP_NAME=$(find client/release -name "*.app" -maxdepth 2 -type d -exec basename {} \; | head -1)
          VERSION=$(node -p "require('./client/package.json').version")
          DMG_PATH="client/release/NearuVibe-${VERSION}-arm64.dmg"
          hdiutil create -volname "NearuVibe" -srcfolder "$APP_DIR" \
            -ov -format UDZO "$DMG_PATH"
          echo "DMG created: $DMG_PATH"

      - name: Create ZIP
        run: |
          APP_DIR=$(find client/release -name "*.app" -maxdepth 2 -type d -exec dirname {} \; | head -1)
          APP_NAME=$(find client/release -name "*.app" -maxdepth 2 -type d -exec basename {} \; | head -1)
          VERSION=$(node -p "require('./client/package.json').version")
          ZIP_PATH="client/release/NearuVibe-${VERSION}-mac.zip"
          cd "$APP_DIR" && ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "../NearuVibe-${VERSION}-mac.zip"
          echo "ZIP created: $ZIP_PATH"

      # ── Upload artifacts ─────────────────────────────────────────
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NearuVibe-macOS-dmg
          path: client/release/*.dmg
          if-no-files-found: warn

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: NearuVibe-macOS-zip
          path: client/release/*.zip
          if-no-files-found: warn

      # ── Attach to GitHub Release (only on tag push) ──────────────
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/release/*.dmg
            client/release/*.zip
