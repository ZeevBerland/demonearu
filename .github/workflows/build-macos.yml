name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python / Orchestrator ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create venv & install Python deps
        working-directory: orchestrator
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Pre-download hsemotion ONNX model
        working-directory: orchestrator
        run: |
          source .venv/bin/activate
          python -c "
          from hsemotion_onnx.facial_emotions import HSEmotionRecognizer
          m = HSEmotionRecognizer(model_name='enet_b0_8_va_mtl')
          print('Model downloaded and cached in package directory')
          "

      - name: Freeze orchestrator with PyInstaller
        working-directory: orchestrator
        run: |
          source .venv/bin/activate
          pyinstaller nearu-orchestrator.spec --noconfirm

      - name: Verify orchestrator binary
        working-directory: orchestrator
        run: |
          BIN="dist/nearu-orchestrator/nearu-orchestrator"
          ls -la "$BIN"
          file "$BIN"
          echo "Binary size: $(du -sh dist/nearu-orchestrator | cut -f1)"

      # ── Inject default API keys from secrets ─────────────────────
      - name: Create default-keys.json
        working-directory: client
        run: |
          cat > default-keys.json <<KEYSEOF
          {
            "OPENAI_API_KEY": "${{ secrets.OPENAI_API_KEY }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }
          KEYSEOF

      - name: Verify default-keys.json
        working-directory: client
        run: |
          if [ -f default-keys.json ]; then
            echo "default-keys.json exists ($(wc -c < default-keys.json) bytes)"
            python3 -c "import json; d=json.load(open('default-keys.json')); print(f'OpenAI key: {\"set\" if d.get(\"OPENAI_API_KEY\") else \"EMPTY\"}, Gemini key: {\"set\" if d.get(\"GEMINI_API_KEY\") else \"EMPTY\"}')"
          else
            echo "WARNING: default-keys.json not found!"
          fi

      # ── Node / Electron ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Node dependencies
        working-directory: client
        run: npm ci

      - name: Build Electron client
        working-directory: client
        run: npm run build

      - name: Package macOS app (unsigned bundle)
        working-directory: client
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --dir --publish never

      # ── Fix permissions + sign ALL binaries ─────────────────────
      - name: Fix permissions and codesign
        run: |
          APP=$(find client/release -name "*.app" -maxdepth 2 -type d | head -1)
          ORCH="$APP/Contents/Resources/orchestrator"

          echo "=== Fixing execute permissions ==="
          chmod -R +x "$ORCH"

          echo "=== Signing all Mach-O binaries in orchestrator _internal ==="
          SIGNED=0
          find "$ORCH" -type f | while read f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --sign - "$f" 2>/dev/null && SIGNED=$((SIGNED+1))
            fi
          done
          echo "Signed orchestrator binaries"

          echo "=== Signing main app bundle ==="
          codesign --force --deep --sign - "$APP"
          echo "=== Verifying ==="
          codesign --verify --deep --strict "$APP" 2>&1 || echo "(non-fatal for ad-hoc)"
          echo "Done"

      # ── Create DMG and ZIP from signed bundle ──────────────────
      - name: Create DMG
        run: |
          APP_DIR=$(find client/release -name "*.app" -maxdepth 2 -type d -exec dirname {} \; | head -1)
          APP_NAME=$(find client/release -name "*.app" -maxdepth 2 -type d -exec basename {} \; | head -1)
          VERSION=$(node -p "require('./client/package.json').version")
          DMG_PATH="client/release/NearuVibe-${VERSION}-arm64.dmg"
          hdiutil create -volname "NearuVibe" -srcfolder "$APP_DIR" \
            -ov -format UDZO "$DMG_PATH"
          echo "DMG created: $DMG_PATH"

      - name: Create ZIP
        run: |
          APP_DIR=$(find client/release -name "*.app" -maxdepth 2 -type d -exec dirname {} \; | head -1)
          APP_NAME=$(find client/release -name "*.app" -maxdepth 2 -type d -exec basename {} \; | head -1)
          VERSION=$(node -p "require('./client/package.json').version")
          ZIP_PATH="client/release/NearuVibe-${VERSION}-mac.zip"
          cd "$APP_DIR" && ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "../NearuVibe-${VERSION}-mac.zip"
          echo "ZIP created: $ZIP_PATH"

      # ── Final verification ────────────────────────────────────────
      - name: Verify packaged app contents
        run: |
          APP=$(find client/release -name "*.app" -maxdepth 2 -type d | head -1)
          echo "=== App bundle: $APP ==="
          echo "--- Orchestrator binary ---"
          ls -la "$APP/Contents/Resources/orchestrator/nearu-orchestrator" 2>/dev/null || echo "NOT FOUND"
          echo "--- Default keys ---"
          ls -la "$APP/Contents/Resources/default-keys.json" 2>/dev/null || echo "NOT FOUND"
          echo "--- Codesign verify ---"
          codesign --verify --deep --strict "$APP" 2>&1 || echo "Signature verification failed (non-fatal for ad-hoc)"
          echo "--- Bundle size ---"
          du -sh "$APP"

      # ── Upload artifacts ─────────────────────────────────────────
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NearuVibe-macOS-dmg
          path: client/release/*.dmg
          if-no-files-found: warn

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: NearuVibe-macOS-zip
          path: client/release/*.zip
          if-no-files-found: warn

      # ── Attach to GitHub Release (only on tag push) ──────────────
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/release/*.dmg
            client/release/*.zip
